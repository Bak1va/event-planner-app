<article class="event-card">
  <div class="card-actions">
    <button class="card-action-button" type="button" (click)="edit.emit()" aria-label="Edit event">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          d="M4 20.5V16l10.9-10.9a1.5 1.5 0 0 1 2.1 0l1.9 1.9a1.5 1.5 0 0 1 0 2.1L8 20.5H4Zm2-2h1.2l9.9-9.9-1.2-1.2L6 17.3v1.2Zm10.5-11.4 1.2 1.2"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.8"
        />
      </svg>
    </button>
    <button
      class="card-action-button card-action-button-danger"
      type="button"
      [disabled]="isDeleting()"
      (click)="deleteRequested.emit()"
      [attr.aria-label]="isDeleting() ? 'Deleting event' : 'Delete event'"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          d="M5 7h14m-9 0V4h4v3m-6 0 1 12h6l1-12M9 10.5v5m6-5v5"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.8"
        />
      </svg>
    </button>
  </div>

  <img
    class="event-image"
    [src]="event().imageUrl"
    [alt]="event().title"
    loading="lazy"
  />

  <div class="event-content">
    <h2>{{ event().title }}</h2>
    <p class="event-meta">{{ event().date }} • {{ event().location }}</p>
    <p>{{ event().description }}</p>
  </div>
</article>
