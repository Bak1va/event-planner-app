name: Event Planner CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          
      - name: Restore dependencies
        run: dotnet restore ./backend/Backend.csproj && dotnet restore ./Backend.Tests/Backend.Tests.csproj
        
      - name: Build Backend
        run: dotnet build ./backend/Backend.csproj --no-restore
        
      - name: Run Backend Tests
        run: dotnet test ./Backend.Tests/Backend.Tests.csproj --no-build --verbosity normal --logger "console;verbosity=detailed"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: cd frontend && npm install
        
      - name: Lint Frontend
        run: cd frontend && npm run lint
        
      - name: Build Frontend
        run: cd frontend && npm run build -- --configuration=production

      - name: Run Frontend Tests
        run: cd frontend && npm test -- --watch=false

  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose config